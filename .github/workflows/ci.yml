name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - run: corepack enable

      - run: pnpm --version

      - name: install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: format
        run: pnpm format

      - name: lint
        run: pnpm run lint

      - name: test
        if: (${{ success() }} || ${{ failure() }})
        run: pnpm test:self
